version: '3.8'

services:
  db:
      image: postgres:15-alpine
      volumes:
        - postgres_data:/var/lib/postgresql/data/
      environment:
        - POSTGRES_DB=scanner_db
        - POSTGRES_USER=scanner_user
        - POSTGRES_PASSWORD=scanner_password

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:5000
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=scanner_db
      - DB_USER=scanner_user
      - DB_PASSWORD=scanner_password
      - DB_HOST=db
      - DB_PORT=5432
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZAP_API_URL=http://zap:8080
    depends_on:
      - db
      - zap

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.any=true
    ports:
      - "8080:8080"

volumes:
  postgres_data:
